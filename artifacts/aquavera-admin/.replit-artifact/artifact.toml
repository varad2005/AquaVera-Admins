kind = "web"
previewPath = "/"
title = "AquaVera Admin Panel"
version = "1.0.0"
id = "artifacts/aquavera-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24854

[services.development]
run = "pnpm --filter @workspace/aquavera-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aquavera-admin", "run", "build" ]
publicDir = "artifacts/aquavera-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24854"
BASE_PATH = "/"
